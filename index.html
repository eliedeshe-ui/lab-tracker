<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lab Tracker" />
  <title>Lab Tracker</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh}
    .app{max-width:460px;margin:0 auto;padding:20px 16px 60px}
    h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
    h2{font-size:18px;font-weight:700;letter-spacing:-0.2px}
    button{font-family:inherit;font-size:14px;font-weight:500;padding:9px 16px;border-radius:10px;border:1px solid rgba(0,0,0,0.18);background:#fff;color:#1a1a18;cursor:pointer}
    button.primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
    button.danger{background:#fff0ee;color:#c0392b;border-color:#c0392b}
    button:disabled{opacity:0.4;cursor:not-allowed}
    input{font-family:inherit;font-size:15px;padding:10px 12px;border-radius:10px;border:1px solid rgba(0,0,0,0.18);background:#fff;color:#1a1a18;width:100%;outline:none;-webkit-appearance:none}
    input:focus{border-color:#1a1a18}
    .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-bottom:8px}
    .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block}
    .ok{background:#e0f5ec;color:#0a6640}
    .out{background:#fdecea;color:#a93226}
    .chip{font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:1px solid rgba(0,0,0,0.12);background:#fff;color:#666;cursor:pointer;white-space:nowrap;font-family:inherit}
    .chip.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
    .mc{background:#fff;border:1px solid rgba(0,0,0,0.09);border-radius:10px;padding:12px;cursor:pointer}
    .mc.oor{border-color:#c0392b}
    .mono{font-family:'SF Mono',Menlo,monospace}
    .between{display:flex;justify-content:space-between;align-items:center}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .stat{background:#fff;border:1px solid rgba(0,0,0,0.09);border-radius:10px;padding:12px;text-align:center}
    .sn{font-size:24px;font-weight:700}
    .sl{font-size:11px;color:#888;margin-top:2px}
    .empty{text-align:center;padding:48px 24px;border:1.5px dashed rgba(0,0,0,0.15);border-radius:12px;margin-top:16px}
    .divider{height:1px;background:rgba(0,0,0,0.08);margin:20px 0}
    .back{background:none;border:none;padding:0;font-size:15px;color:#0070f3;font-weight:500;cursor:pointer;margin-bottom:16px;display:block}
    .loader{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .errbox{background:#fdecea;border:1px solid #c0392b;border-radius:10px;padding:10px 14px;font-size:13px;color:#a93226;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .field{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:10px 12px}
    .field.ex{border-color:#1D9E75}
    .field label{font-size:10px;color:#888;display:flex;justify-content:space-between;margin-bottom:2px}
    .field .unit{font-size:10px;color:#bbb;margin-bottom:4px}
    .field input{font-size:13px;padding:4px 0;border:none;background:none;border-radius:0;width:100%}
    .field input:focus{box-shadow:none}
    .row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
    .chart-wrap{height:200px;margin:20px 0}
    .hist{border-radius:12px;border:1px solid rgba(0,0,0,0.08);overflow:hidden}
    .hist-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid rgba(0,0,0,0.07)}
    .hist-row:last-child{border-bottom:none}
  </style>
</head>
<body>
<div id="root"><div style="padding:40px;text-align:center;color:#aaa;font-size:15px">Loading...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script>
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;
var el = React.createElement;

var M = {
  glucose:      {l:'Glucose',           u:'mg/dL',  c:'Metabolic',    lo:70,   hi:99,   d:0},
  hba1c:        {l:'HbA1c',             u:'%',       c:'Metabolic',    lo:4.0,  hi:5.6,  d:1},
  insulin:      {l:'Insulin (fasting)',  u:'µIU/mL', c:'Metabolic',    lo:2.6,  hi:24.9, d:1},
  total_chol:   {l:'Total Cholesterol',  u:'mg/dL',  c:'Lipids',       lo:null, hi:199,  d:0},
  ldl:          {l:'LDL',               u:'mg/dL',  c:'Lipids',       lo:null, hi:99,   d:0},
  hdl:          {l:'HDL',               u:'mg/dL',  c:'Lipids',       lo:40,   hi:null, d:0},
  triglycerides:{l:'Triglycerides',      u:'mg/dL',  c:'Lipids',       lo:null, hi:149,  d:0},
  testosterone: {l:'Total Testosterone', u:'ng/dL',  c:'Hormones',     lo:300,  hi:1000, d:0},
  free_t:       {l:'Free Testosterone',  u:'ng/dL',  c:'Hormones',     lo:9,    hi:30,   d:1},
  shbg:         {l:'SHBG',              u:'nmol/L', c:'Hormones',     lo:10,   hi:57,   d:0},
  estradiol:    {l:'Estradiol',          u:'pg/mL',  c:'Hormones',     lo:7.6,  hi:42.6, d:1},
  dhea:         {l:'DHEA-S',            u:'µg/dL',  c:'Hormones',     lo:138,  hi:475,  d:0},
  tsh:          {l:'TSH',               u:'mIU/L',  c:'Thyroid',      lo:0.4,  hi:4.0,  d:2},
  free_t3:      {l:'Free T3',           u:'pg/mL',  c:'Thyroid',      lo:2.3,  hi:4.2,  d:1},
  free_t4:      {l:'Free T4',           u:'ng/dL',  c:'Thyroid',      lo:0.8,  hi:1.8,  d:2},
  crp:          {l:'hs-CRP',            u:'mg/L',   c:'Inflammation', lo:null, hi:1.0,  d:1},
  homocysteine: {l:'Homocysteine',       u:'µmol/L', c:'Inflammation', lo:null, hi:15,   d:1},
  alt:          {l:'ALT',               u:'U/L',    c:'Liver',        lo:7,    hi:56,   d:0},
  ast:          {l:'AST',               u:'U/L',    c:'Liver',        lo:10,   hi:40,   d:0},
  ggt:          {l:'GGT',               u:'U/L',    c:'Liver',        lo:8,    hi:61,   d:0},
  creatinine:   {l:'Creatinine',         u:'mg/dL',  c:'Kidney',       lo:0.74, hi:1.35, d:2},
  bun:          {l:'BUN',               u:'mg/dL',  c:'Kidney',       lo:7,    hi:25,   d:0},
  egfr:         {l:'eGFR',              u:'mL/min', c:'Kidney',       lo:60,   hi:null, d:0},
  vitd:         {l:'Vitamin D',          u:'ng/mL',  c:'Nutrients',    lo:30,   hi:100,  d:0},
  ferritin:     {l:'Ferritin',           u:'ng/mL',  c:'Nutrients',    lo:12,   hi:300,  d:0},
  b12:          {l:'Vitamin B12',        u:'pg/mL',  c:'Nutrients',    lo:200,  hi:900,  d:0},
  wbc:          {l:'WBC',               u:'K/µL',   c:'CBC',          lo:4.5,  hi:11.0, d:1},
  hemoglobin:   {l:'Hemoglobin',         u:'g/dL',   c:'CBC',          lo:13.5, hi:17.5, d:1},
  hematocrit:   {l:'Hematocrit',         u:'%',       c:'CBC',          lo:40,   hi:52,   d:1},
  platelets:    {l:'Platelets',          u:'K/µL',   c:'CBC',          lo:150,  hi:400,  d:0}
};

var CATS = ['Metabolic','Lipids','Hormones','Thyroid','Inflammation','Liver','Kidney','Nutrients','CBC'];
var BY_CAT = {};
CATS.forEach(function(c){ BY_CAT[c] = []; });
Object.keys(M).forEach(function(k){ BY_CAT[M[k].c].push(k); });

function getStatus(k, v) {
  if (v == null) return 'none';
  if (M[k].lo != null && v < M[k].lo) return 'low';
  if (M[k].hi != null && v > M[k].hi) return 'high';
  return 'ok';
}

function fmtDate(s) {
  if (!s) return '';
  return new Date(s + 'T12:00:00').toLocaleDateString('en-US', {month:'short', year:'numeric'});
}

function getKey() { return localStorage.getItem('lab_ak') || ''; }
function setKey(v) { localStorage.setItem('lab_ak', v); }
function getSessions() { try { return JSON.parse(localStorage.getItem('lab_sessions') || '[]'); } catch(e) { return []; } }
function saveSessions(arr) { localStorage.setItem('lab_sessions', JSON.stringify(arr)); }

var EXTRACT_PROMPT = [
  'You are a medical lab report parser. Extract all lab values from this document.',
  'Return ONLY a valid JSON object with no extra text, no markdown, no backticks:',
  '{"date":"YYYY-MM-DD or null","values":{"key":number}}',
  'Map results to these keys:'
].join('\n') + '\n' +
Object.keys(M).map(function(k){ return k + ': ' + M[k].l + ' (' + M[k].u + ')'; }).join('\n') +
'\nOnly include markers present in the report. Convert units if needed. Return ONLY the JSON object.';

function callAPI(b64, mime, apiKey) {
  var block = mime === 'application/pdf'
    ? {type:'document', source:{type:'base64', media_type:'application/pdf', data:b64}}
    : {type:'image', source:{type:'base64', media_type:mime, data:b64}};
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1500,
      messages: [{role:'user', content:[block, {type:'text', text:EXTRACT_PROMPT}]}]
    })
  }).then(function(r) {
    return r.json().then(function(d) {
      if (!r.ok) throw new Error('API ' + r.status + ': ' + ((d.error && d.error.message) || JSON.stringify(d)));
      var txt = '';
      (d.content || []).forEach(function(b){ if (b.type === 'text') txt = b.text; });
      if (!txt) throw new Error('Empty response from API');
      var cleaned = txt.replace(/```json\n?|```\n?/g, '').trim();
      var start = cleaned.indexOf('{');
      var end = cleaned.lastIndexOf('}');
      if (start === -1 || end === -1) throw new Error('No JSON in response: ' + cleaned.slice(0, 200));
      return JSON.parse(cleaned.substring(start, end + 1));
    });
  });
}

function TrendChart(props) {
  var mkey = props.mkey;
  var data = props.data;
  var canvasRef = useRef(null);
  var chartRef = useRef(null);

  useEffect(function() {
    if (!canvasRef.current || !data.length) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    var m = M[mkey];
    var vals = data.map(function(d){ return d.value; });
    var mn = Math.min.apply(null, vals);
    var mx = Math.max.apply(null, vals);
    var pad = ((mx - mn) * 0.4) || 20;
    var yMin = Math.max(0, parseFloat((mn - pad).toFixed(m.d)));
    var yMax = parseFloat((mx + pad).toFixed(m.d));
    var datasets = [{
      data: vals,
      borderColor: '#1D9E75',
      borderWidth: 2.5,
      pointBackgroundColor: data.map(function(d){ return d.st === 'ok' ? '#1D9E75' : '#c0392b'; }),
      pointBorderColor: '#fff',
      pointBorderWidth: 2,
      pointRadius: 5,
      tension: 0.3,
      fill: false
    }];
    if (m.lo != null) {
      datasets.push({data:data.map(function(){ return m.lo; }),borderColor:'#c0392b',borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false});
    }
    if (m.hi != null) {
      datasets.push({data:data.map(function(){ return m.hi; }),borderColor:'#c0392b',borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false});
    }
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { labels: data.map(function(d){ return d.date; }), datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            filter: function(item){ return item.datasetIndex === 0; },
            callbacks: { label: function(ctx){ return Number(ctx.parsed.y).toFixed(m.d) + ' ' + m.u; } }
          }
        },
        scales: {
          x: { ticks: { color:'#aaa', font:{size:10} }, grid: { color:'rgba(0,0,0,0.05)' } },
          y: { min:yMin, max:yMax, ticks: { color:'#aaa', font:{size:10} }, grid: { color:'rgba(0,0,0,0.05)' } }
        }
      }
    });
    return function() { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [mkey, data.length]);

  return el('canvas', { ref: canvasRef });
}

function Settings(props) {
  var s = useState(getKey()); var k = s[0]; var setK = s[1];
  var s2 = useState(false); var saved = s2[0]; var setSaved = s2[1];
  function saveKey() { setKey(k.trim()); setSaved(true); setTimeout(function(){ setSaved(false); }, 2000); }
  return el('div', {className:'app'},
    el('button', {className:'back', onClick:props.onBack}, '← Back'),
    el('h2', null, 'Settings'),
    el('p', {style:{fontSize:13,color:'#666',margin:'8px 0 20px'}}, 'Your API key is stored only on this device.'),
    el('div', {className:'lbl', style:{marginTop:0}}, 'Anthropic API Key'),
    el('input', {type:'password', value:k, placeholder:'sk-ant-...', onChange:function(e){ setK(e.target.value); }}),
    el('div', {style:{marginTop:10}}, el('button', {className:'primary', onClick:saveKey}, saved ? '✓ Saved' : 'Save key')),
    el('div', {className:'divider'}),
    el('p', {style:{fontSize:13,color:'#666',lineHeight:1.6}}, "No key yet? Go to console.anthropic.com → API Keys → Create Key.")
  );
}

function Detail(props) {
  var mkey = props.mkey;
  var m = M[mkey];
  var sorted = props.sessions.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  var data = sorted.filter(function(s){ return s.values[mkey] != null; }).map(function(s){
    return { date:fmtDate(s.date), value:s.values[mkey], st:getStatus(mkey, s.values[mkey]) };
  });
  var rng = m.lo != null && m.hi != null ? m.lo+'–'+m.hi+' '+m.u : m.lo == null ? '<'+m.hi+' '+m.u : '>'+m.lo+' '+m.u;
  return el('div', {className:'app'},
    el('button', {className:'back', onClick:props.onBack}, '← Back'),
    el('div', {className:'between', style:{marginBottom:4}},
      el('h2', null, m.l),
      el('span', {style:{fontSize:11,color:'#888',fontFamily:'monospace'}}, rng)
    ),
    el('p', {style:{fontSize:12,color:'#aaa',marginBottom:20}}, m.c),
    data.length === 0
      ? el('div', {className:'empty'}, el('p', {style:{color:'#888',fontSize:14}}, 'No data yet for this marker.'))
      : el('div', null,
          el('div', {className:'chart-wrap'}, el(TrendChart, {mkey:mkey, data:data})),
          el('div', {className:'hist'},
            data.slice().reverse().map(function(d,i){
              return el('div', {key:i, className:'hist-row'},
                el('span', {style:{fontSize:14,color:'#666'}}, d.date),
                el('div', {style:{display:'flex',alignItems:'center',gap:8}},
                  el('span', {className:'mono', style:{fontSize:15,fontWeight:600}}, Number(d.value).toFixed(m.d)+' '+m.u),
                  el('span', {className:'badge '+(d.st==='ok'?'ok':'out')}, d.st==='ok'?'✓ in range':d.st.toUpperCase())
                )
              );
            })
          )
        )
  );
}

function Review(props) {
  var form = props.form; var setForm = props.setForm;
  return el('div', {className:'app'},
    el('button', {className:'back', onClick:props.onCancel}, '← Cancel'),
    el('h2', null, 'Review extracted values'),
    el('p', {style:{fontSize:13,color:'#666',margin:'4px 0 20px'}}, props.count+' markers found — edit anything before saving'),
    el('div', {style:{display:'flex',alignItems:'center',gap:12,marginBottom:24}},
      el('label', {style:{fontSize:13,color:'#666',whiteSpace:'nowrap'}}, 'Draw date'),
      el('input', {type:'date', value:form.date, style:{flex:1}, onChange:function(e){ setForm({date:e.target.value,values:form.values}); }})
    ),
    CATS.map(function(cat){
      var keys = BY_CAT[cat];
      var n = keys.filter(function(k){ return form.values[k]!=null && form.values[k]!==''; }).length;
      return el('div', {key:cat, style:{marginBottom:20}},
        el('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:8}},
          el('div', {className:'lbl', style:{marginBottom:0}}, cat),
          n > 0 ? el('span', {className:'badge ok'}, '+'+n) : null
        ),
        el('div', {className:'g2'},
          keys.map(function(k){
            var hasVal = form.values[k]!=null && form.values[k]!=='';
            return el('div', {key:k, className:'field '+(hasVal?'ex':''), style:{opacity:hasVal?1:0.5}},
              el('label', null, el('span',null,M[k].l), hasVal?el('span',{style:{color:'#1D9E75'}},'✓'):null),
              el('div', {className:'unit'}, M[k].u),
              el('input', {type:'number',step:'any',placeholder:'—',value:form.values[k]||'',
                onChange:function(e){ var v=Object.assign({},form.values); v[k]=e.target.value; setForm({date:form.date,values:v}); }})
            );
          })
        )
      );
    }),
    el('div', {style:{display:'flex',gap:8,marginTop:8}},
      el('button', {className:'primary', onClick:props.onSave, disabled:!form.date}, 'Save session'),
      el('button', {onClick:props.onCancel}, 'Cancel')
    )
  );
}

function Add(props) {
  var form = props.form; var setForm = props.setForm;
  return el('div', {className:'app'},
    el('button', {className:'back', onClick:props.onCancel}, '← Cancel'),
    el('h2', null, 'Add lab session'),
    el('div', {style:{margin:'16px 0 24px'}},
      el('label', {style:{fontSize:13,color:'#666',display:'block',marginBottom:6}}, 'Draw date'),
      el('input', {type:'date', value:form.date, onChange:function(e){ setForm({date:e.target.value,values:form.values}); }})
    ),
    CATS.map(function(cat){
      return el('div', {key:cat, style:{marginBottom:20}},
        el('div', {className:'lbl'}, cat),
        el('div', {className:'g2'},
          BY_CAT[cat].map(function(k){
            return el('div', {key:k, className:'field'},
              el('label', null, el('span',null,M[k].l)),
              el('div', {className:'unit'}, M[k].u),
              el('input', {type:'number',step:'any',placeholder:'—',value:form.values[k]||'',
                onChange:function(e){ var v=Object.assign({},form.values); v[k]=e.target.value; setForm({date:form.date,values:v}); }})
            );
          })
        )
      );
    }),
    el('div', {style:{display:'flex',gap:8,marginTop:8}},
      el('button', {className:'primary', onClick:props.onSave, disabled:!form.date}, 'Save session'),
      el('button', {onClick:props.onCancel}, 'Cancel')
    )
  );
}

function App() {
  var s1=useState(getSessions()); var sessions=s1[0]; var setSessions=s1[1];
  var s2=useState('dash');        var view=s2[0];     var setView=s2[1];
  var s3=useState(null);          var sel=s3[0];      var setSel=s3[1];
  var s4=useState('All');         var cat=s4[0];      var setCat=s4[1];
  var s5=useState({date:'',values:{}}); var form=s5[0]; var setForm=s5[1];
  var s6=useState(false);         var busy=s6[0];     var setBusy=s6[1];
  var s7=useState(null);          var err=s7[0];      var setErr=s7[1];
  var s8=useState(0);             var count=s8[0];    var setCount=s8[1];
  var fref=useRef(null);

  function persist(arr){ setSessions(arr); saveSessions(arr); }

  var sorted=sessions.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  var latest=sorted[sorted.length-1];
  var prev=sorted[sorted.length-2];
  var allKeys=Object.keys(M);
  var tracked=latest?allKeys.filter(function(k){ return latest.values[k]!=null; }).length:0;
  var oor=latest?allKeys.filter(function(k){ return latest.values[k]!=null&&getStatus(k,latest.values[k])!=='ok'; }).length:0;

  function onFile(e) {
    var file=e.target.files[0]; if(!file) return;
    e.target.value='';
    var apiKey=getKey();
    if(!apiKey){ setErr('Add your Anthropic API key in Settings first.'); return; }
    if(file.size > 10*1024*1024){ setErr('File too large (max 10MB). Try a screenshot instead.'); return; }
    setErr(null); setBusy(true);
    var reader=new FileReader();
    reader.onload=function(){
      var b64=reader.result.split(',')[1];
      callAPI(b64,file.type,apiKey).then(function(extracted){
        var vals={};
        Object.keys(extracted.values||{}).forEach(function(k){
          var v=extracted.values[k];
          if(M[k]&&typeof v==='number') vals[k]=String(v);
        });
        setCount(Object.keys(vals).length);
        setForm({date:extracted.date||new Date().toISOString().split('T')[0],values:vals});
        setView('review'); setBusy(false);
      }).catch(function(ex){ setErr(ex.message); setBusy(false); });
    };
    reader.onerror=function(){ setErr('Could not read file.'); setBusy(false); };
    reader.readAsDataURL(file);
  }

  function saveSession(){
    if(!form.date) return;
    var vals={};
    Object.keys(form.values).forEach(function(k){ var v=form.values[k]; if(v!=null&&v!=='') vals[k]=parseFloat(v); });
    var updated=sessions.filter(function(s){ return s.date!==form.date; });
    updated.push({id:Date.now(),date:form.date,values:vals});
    persist(updated); setView('dash'); setForm({date:'',values:{}}); setCount(0);
  }

  function cancel(){ setView('dash'); setForm({date:'',values:{}}); setCount(0); }
  function deleteSession(id){ persist(sessions.filter(function(s){ return s.id!==id; })); }

  if(view==='settings') return el(Settings,{onBack:function(){ setView('dash'); }});
  if(view==='detail')   return el(Detail,  {mkey:sel,sessions:sessions,onBack:function(){ setView('dash'); }});
  if(view==='review')   return el(Review,  {form:form,setForm:setForm,count:count,onSave:saveSession,onCancel:cancel});
  if(view==='add')      return el(Add,     {form:form,setForm:setForm,onSave:saveSession,onCancel:cancel});

  var keys=cat==='All'?allKeys:(BY_CAT[cat]||allKeys);

  return el('div', {className:'app'},
    el('input',{type:'file',ref:fref,accept:'application/pdf,image/*',style:{display:'none'},onChange:onFile}),
    el('div',{className:'between',style:{marginBottom:4}},
      el('h1',null,'Lab Panel'),
      el('button',{onClick:function(){ setView('settings'); },style:{border:'none',background:'none',fontSize:22,padding:4,color:'#888',cursor:'pointer'}},'⚙')
    ),
    el('p',{style:{fontSize:13,color:'#888',marginBottom:16}},
      latest?'Last draw: '+fmtDate(latest.date)+' · '+sessions.length+' session'+(sessions.length!==1?'s':''):'No sessions yet'
    ),
    el('div',{style:{display:'flex',gap:8,marginBottom:20}},
      el('button',{className:'primary',disabled:busy,style:{flex:1,fontSize:15,padding:'11px 16px'},onClick:function(){ fref.current.click(); }},
        busy?el('span',null,el('span',{className:'loader'}),'Parsing...'):'⬆ Upload Report'
      ),
      el('button',{onClick:function(){ setView('add'); },style:{padding:'11px 14px'}},'+ Manual')
    ),
    err?el('div',{className:'errbox'},el('span',null,err),el('span',{onClick:function(){ setErr(null); },style:{cursor:'pointer',fontSize:18,marginLeft:8}},'×')):null,
    sessions.length>0?el('div',{className:'g3',style:{marginBottom:20}},
      el('div',{className:'stat'},el('div',{className:'mono sn'},sessions.length),el('div',{className:'sl'},'draws')),
      el('div',{className:'stat'},el('div',{className:'mono sn'},tracked),el('div',{className:'sl'},'markers')),
      el('div',{className:'stat',style:{background:oor>0?'#fdecea':'#e0f5ec'}},
        el('div',{className:'mono sn',style:{color:oor>0?'#a93226':'#0a6640'}},oor),
        el('div',{className:'sl',style:{color:oor>0?'#a93226':'#0a6640'}},'out of range')
      )
    ):null,
    sessions.length===0?el('div',{className:'empty'},
      el('div',{style:{fontSize:44,marginBottom:12}},'🧪'),
      el('p',{style:{fontWeight:700,fontSize:16,marginBottom:6}},'No sessions yet'),
      el('p',{style:{fontSize:14,color:'#888'}},'Upload a PDF or photo of your lab report to get started.')
    ):null,
    sessions.length>0?el('div',{className:'chips'},
      ['All'].concat(CATS).map(function(c){
        return el('button',{key:c,className:'chip '+(cat===c?'active':''),onClick:function(){ setCat(c); }},c);
      })
    ):null,
    sessions.length>0?el('div',{className:'g2'},
      keys.map(function(k){
        var v=latest&&latest.values[k]!=null?latest.values[k]:null;
        var st=getStatus(k,v);
        var isOor=v!=null&&st!=='ok';
        var pv=prev&&prev.values[k]!=null?prev.values[k]:null;
        var tr=(v!=null&&pv!=null)?(v>pv?'↑':v<pv?'↓':'→'):null;
        return el('div',{key:k,className:'mc'+(isOor?' oor':''),onClick:function(){ setSel(k); setView('detail'); }},
          el('div',{className:'between',style:{marginBottom:4}},
            el('span',{style:{fontSize:11,color:'#666',lineHeight:1.3,flex:1}},M[k].l),
            v!=null?el('span',{className:'badge '+(st==='ok'?'ok':'out')},st==='ok'?'✓':st.toUpperCase()):null
          ),
          el('div',{style:{display:'flex',alignItems:'baseline',gap:3}},
            el('span',{className:'mono',style:{fontSize:18,fontWeight:700,color:isOor?'#a93226':'#1a1a18'}},v!=null?Number(v).toFixed(M[k].d):'—'),
            v!=null?el('span',{style:{fontSize:10,color:'#aaa'}},M[k].u):null,
            tr?el('span',{style:{fontSize:12,color:'#aaa',marginLeft:'auto'}},tr):null
          )
        );
      })
    ):null,
    sessions.length>0?el('div',null,
      el('div',{className:'divider'}),
      el('div',{className:'lbl'},'Sessions'),
      sorted.slice().reverse().map(function(s){
        return el('div',{key:s.id,className:'row-item'},
          el('span',{style:{fontSize:14}},fmtDate(s.date)),
          el('div',{style:{display:'flex',gap:10,alignItems:'center'}},
            el('span',{style:{fontSize:12,color:'#aaa'}},Object.keys(s.values).length+' markers'),
            el('button',{className:'danger',style:{fontSize:11,padding:'3px 10px'},onClick:function(){ deleteSession(s.id); }},'Delete')
          )
        );
      })
    ):null
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(el(App));
</script>
</body>
</html>
